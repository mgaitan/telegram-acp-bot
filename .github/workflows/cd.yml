name: Publish to PyPI

on:
  release:
    types: [created]
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: github.event_name == 'release'

  docs-build:
    name: Build documentation
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - name: Build docs
        run: make docs

  docs-publish:
    name: Publish documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs-build
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: ${{ github.event_name == 'pull_request' && 'github-pages-preview' || 'github-pages' }}
      url: ${{ steps.preview_url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/configure-pages@v5
      - uses: astral-sh/setup-uv@v7
      - name: Stage documentation artifact
        run: |
          set -euo pipefail
          out_dir="site"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pr_number="${{ github.event.pull_request.number }}"
            latest_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [ -n "$latest_tag" ]; then
              stable_dir="$(mktemp -d)"
              git worktree add "$stable_dir" "$latest_tag"
              (
                cd "$stable_dir"
                make docs
              )
              cp -a "$stable_dir/docs/_build/html/." "$out_dir/"
              git worktree remove "$stable_dir" --force
            else
              make docs
              cp -a docs/_build/html/. "$out_dir/"
            fi
            make docs
            mkdir -p "$out_dir/_preview/pr-$pr_number"
            cp -a docs/_build/html/. "$out_dir/_preview/pr-$pr_number/"
          else
            make docs
            cp -a docs/_build/html/. "$out_dir/"
          fi
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Compute documentation URL
        id: preview_url
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            url="${url%/}/_preview/pr-${{ github.event.pull_request.number }}/"
          fi
          echo "url=${url}" >> "$GITHUB_OUTPUT"
      - name: Summarize documentation URL
        run: |
          echo "Documentation published at: ${{ steps.preview_url.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
