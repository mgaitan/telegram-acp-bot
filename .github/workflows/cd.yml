name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/cd.yml"
  release:
    types: [created]
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: github.event_name == 'release'

  docs-build:
    name: Build documentation
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: make docs

  docs-publish:
    name: Publish documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs-build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.preview_url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: astral-sh/setup-uv@v7
      - run: make docs
      - name: Stage documentation artifact
        run: |
          out_dir="site"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cp -a docs/_build/html/. "$out_dir/"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Compute documentation URL
        id: preview_url
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          echo "url=${url}" >> "$GITHUB_OUTPUT"
      - name: Summarize documentation URL
        run: |
          echo "Documentation published at: ${{ steps.preview_url.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
